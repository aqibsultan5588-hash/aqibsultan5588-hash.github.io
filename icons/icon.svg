<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7a0"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Star -->
  <g transform="translate(256,200)">
    <polygon points="0,-80 18,-30 72,-30 28,8 44,60 0,26 -44,60 -28,8 -72,-30 -18,-30" fill="url(#star)" stroke="#e68a00" stroke-width="4"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="380" width="512" height="132" fill="#7ec850" rx="20"/>
  <rect x="0" y="400" width="512" height="112" fill="#5da832" rx="20"/>
  <!-- Player body -->
  <rect x="216" y="300" width="80" height="80" rx="16" fill="#5dade2" stroke="#1a5276" stroke-width="4"/>
  <rect x="226" y="330" width="60" height="25" rx="8" fill="#85c1e9"/>
  <!-- Eyes -->
  <circle cx="236" cy="320" r="10" fill="white"/>
  <circle cx="276" cy="320" r="10" fill="white"/>
  <circle cx="238" cy="322" r="5" fill="#2c3e50"/>
  <circle cx="278" cy="322" r="5" fill="#2c3e50"/>
  <!-- Smile -->
  <path d="M240,340 Q256,354 272,340" fill="none" stroke="#1a5276" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="222" y="374" width="28" height="25" rx="6" fill="#2e86c1" stroke="#1a5276" stroke-width="3"/>
  <rect x="262" y="374" width="28" height="25" rx="6" fill="#2e86c1" stroke="#1a5276" stroke-width="3"/>
</svg>
